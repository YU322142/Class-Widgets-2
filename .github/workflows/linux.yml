name: Build Linux (glibc 2.28)

on:
  push:
    branches: [main]
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux-glibc228:
    name: Build Linux x86_64 (glibc 2.28 + shared Python)
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5

      - name: 📦 Set up uv
        uses: astral-sh/setup-uv@v6

      - name: 📦 Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-linux-glibc228-${{ github.workflow }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-linux-glibc228-${{ github.workflow }}-

      - name: 🧰 Install build tools
        shell: bash
        run: |
          set -euo pipefail
          yum install -y \
            gcc make wget tar xz \
            openssl-devel bzip2-devel libffi-devel zlib-devel \
            xz-devel sqlite-devel readline-devel ncurses-devel \
            gdbm-devel expat-devel libuuid-devel \
            file binutils

      - name: 🐍 Build shared Python 3.12
        id: py
        shell: bash
        run: |
          set -euo pipefail

          PY_VER="3.12.13"
          PREFIX="/opt/python-shared/${PY_VER}"
          PYBIN="${PREFIX}/bin/python3.12"

          if [ ! -x "$PYBIN" ]; then
            cd /tmp
            wget -q "https://www.python.org/ftp/python/${PY_VER}/Python-${PY_VER}.tgz"
            tar -xf "Python-${PY_VER}.tgz"
            cd "Python-${PY_VER}"

            ./configure \
              --prefix="${PREFIX}" \
              --enable-shared \
              --with-ensurepip=install

            make -j"$(nproc)"
            make install
          fi

          echo "python_path=$PYBIN" >> "$GITHUB_OUTPUT"
          echo "${PREFIX}/bin" >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=${PREFIX}/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: ✅ Verify glibc + Python(shared)
        shell: bash
        run: |
          set -euo pipefail
          ldd --version | sed -n '1p'
          "${{ steps.py.outputs.python_path }}" -V
          "${{ steps.py.outputs.python_path }}" - <<'PY'
          import sysconfig
          print("Py_ENABLE_SHARED =", sysconfig.get_config_var("Py_ENABLE_SHARED"))
          assert sysconfig.get_config_var("Py_ENABLE_SHARED") == 1
          PY

      - name: 📦 Install dependencies
        shell: bash
        env:
          UV_PYTHON_DOWNLOADS: never
        run: |
          set -euo pipefail
          uv sync --python "${{ steps.py.outputs.python_path }}"
          uv pip install --python .venv/bin/python pyinstaller

      - name: 🔨 Build ClassWidgets-2 (Linux)
        shell: bash
        env:
          UV_PYTHON_DOWNLOADS: never
        run: |
          set -euo pipefail
          uv run --python .venv/bin/python pyinstaller --noconsole \
            --add-data "src/qml:src/qml" \
            --add-data "src/plugins:src/plugins" \
            --add-data "src/themes:src/themes" \
            --add-data "assets:assets" \
            --add-data "LICENSE:." \
            --paths=. \
            --contents-directory . \
            --name="Class Widgets 2" \
            src/app.py

      - name: 🔎 Check GLIBC symbol compatibility (<= 2.28)
        shell: bash
        run: |
          set -euo pipefail

          TARGET="2.28"
          APP_DIR="dist/Class Widgets 2"

          [ -d "$APP_DIR" ] || { echo "ERROR: $APP_DIR not found"; exit 1; }

          mapfile -d '' ELF_FILES < <(
            find "$APP_DIR" -type f -print0 \
            | xargs -0 file \
            | awk -F: '/ELF/{print $1}' \
            | tr '\n' '\0'
          )

          if [ "${#ELF_FILES[@]}" -eq 0 ]; then
            echo "No ELF files found, skip."
            exit 0
          fi

          OVER=0
          MAXV="0"

          for f in "${ELF_FILES[@]}"; do
            VERS=$(
              readelf --version-info "$f" 2>/dev/null \
              | grep -oE 'GLIBC_[0-9]+\.[0-9]+' \
              | sed 's/GLIBC_//' \
              | sort -Vu || true
            )
            [ -z "$VERS" ] && continue
            FV=$(echo "$VERS" | tail -n1)

            [ "$(printf '%s\n%s\n' "$MAXV" "$FV" | sort -V | tail -n1)" = "$FV" ] && MAXV="$FV"

            if [ "$(printf '%s\n%s\n' "$TARGET" "$FV" | sort -V | tail -n1)" != "$TARGET" ]; then
              echo "❌ $f requires GLIBC_$FV (target <= GLIBC_$TARGET)"
              OVER=1
            fi
          done

          echo "Highest detected GLIBC symbol version: GLIBC_$MAXV"
          [ "$OVER" -eq 0 ] || { echo "GLIBC check failed."; exit 1; }
          echo "✅ GLIBC compatibility check passed."

      - name: 📦 Pack build
        shell: bash
        run: |
          tar -C dist -czf dist/ClassWidgets-2-Linux-X64.tar.gz "Class Widgets 2"

      - name: ☁️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClassWidgets-2-Linux-X64
          path: dist/ClassWidgets-2-Linux-X64.tar.gz
