name: Build Linux (glibc 2.28)

on:
  push:
    branches: [main]
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux-glibc228:
    name: Build Linux x86_64 (glibc 2.28)
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5

      - name: 📦 Set up uv
        uses: astral-sh/setup-uv@v6

      - name: 📦 Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-linux-glibc228-${{ github.workflow }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-linux-glibc228-${{ github.workflow }}-

      - name: 🐍 Select container Python (cp311)
        id: py
        shell: bash
        run: |
          PY="/opt/python/cp311-cp311/bin/python"
          test -x "$PY"
          echo "python_path=$PY" >> "$GITHUB_OUTPUT"

      - name: 📦 Install dependencies
        shell: bash
        env:
          UV_PYTHON_DOWNLOADS: never
        run: |
          ldd --version | sed -n '1p'
          "${{ steps.py.outputs.python_path }}" -V
          "${{ steps.py.outputs.python_path }}" - <<'PY'
          import sysconfig
          print("Py_ENABLE_SHARED =", sysconfig.get_config_var("Py_ENABLE_SHARED"))
          PY

          uv sync --python "${{ steps.py.outputs.python_path }}"
          uv pip install --python .venv/bin/python pyinstaller

      - name: 🔨 Build ClassWidgets-2 (Linux)
        shell: bash
        env:
          UV_PYTHON_DOWNLOADS: never
        run: |
          uv run --python .venv/bin/python pyinstaller --noconsole \
            --add-data "src/qml:src/qml" \
            --add-data "src/plugins:src/plugins" \
            --add-data "src/themes:src/themes" \
            --add-data "assets:assets" \
            --add-data "LICENSE:." \
            --paths=. \
            --contents-directory . \
            --name="Class Widgets 2" \
            src/app.py

      - name: 🔎 Check GLIBC symbol compatibility (<= 2.28)
        shell: bash
        run: |
          set -euo pipefail

          TARGET="2.28"
          APP_DIR="dist/Class Widgets 2"

          if [ ! -d "$APP_DIR" ]; then
            echo "ERROR: Build output not found: $APP_DIR"
            exit 1
          fi

          mapfile -d '' ELF_FILES < <(
            find "$APP_DIR" -type f -print0 \
            | xargs -0 file \
            | awk -F: '/ELF/{print $1}' \
            | tr '\n' '\0'
          )

          if [ "${#ELF_FILES[@]}" -eq 0 ]; then
            echo "No ELF files found under $APP_DIR, skip GLIBC check."
            exit 0
          fi

          OVER_LIMIT=0
          GLOBAL_MAX="0"

          for f in "${ELF_FILES[@]}"; do
            VERS=$(
              readelf --version-info "$f" 2>/dev/null \
              | grep -oE 'GLIBC_[0-9]+\.[0-9]+' \
              | sed 's/GLIBC_//' \
              | sort -Vu || true
            )

            [ -z "$VERS" ] && continue
            FILE_MAX=$(echo "$VERS" | tail -n1)

            if [ "$(printf '%s\n%s\n' "$GLOBAL_MAX" "$FILE_MAX" | sort -V | tail -n1)" = "$FILE_MAX" ]; then
              GLOBAL_MAX="$FILE_MAX"
            fi

            if [ "$(printf '%s\n%s\n' "$TARGET" "$FILE_MAX" | sort -V | tail -n1)" != "$TARGET" ]; then
              echo "❌ $f requires GLIBC_$FILE_MAX (target <= GLIBC_$TARGET)"
              OVER_LIMIT=1
            fi
          done

          echo "Highest detected GLIBC symbol version: GLIBC_$GLOBAL_MAX"

          if [ "$OVER_LIMIT" -ne 0 ]; then
            echo "GLIBC compatibility check failed."
            exit 1
          fi

          echo "✅ GLIBC compatibility check passed (<= GLIBC_$TARGET)."

      - name: 📦 Pack build
        shell: bash
        run: |
          tar -C dist -czf dist/ClassWidgets-2-Linux-X64.tar.gz "Class Widgets 2"

      - name: ☁️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClassWidgets-2-Linux-X64
          path: dist/ClassWidgets-2-Linux-X64.tar.gz
